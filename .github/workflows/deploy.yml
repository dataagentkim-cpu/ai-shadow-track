name: deploy-to-ec2

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key ubuntu@$EC2_HOST '
            cd ~/ai-shadow-track &&
            git pull --ff-only &&
            source venv/bin/activate &&
            pip install -q -r requirements.txt &&
            sudo systemctl restart shadowtrack
          '
