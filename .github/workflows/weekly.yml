name: weekly-shadow-track

on:
  schedule:
    - cron: "0 22 * * 0"  # 매주 일요일 22:00 UTC = 월요일 07:00 KST (한국 개장 전)
  workflow_dispatch: {}

jobs:
  run-weekly-cycle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly shadow track cycle
        working-directory: src
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python run_weekly.py

      - name: Notify Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          STATUS="${{ job.status }}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="AI 섀도우 트랙 주간 사이클 실행 완료 (status: ${STATUS}). /performance 로 결과를 확인하세요."

      - name: Commit updated database
        run: |
          git config user.name "shadow-track-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/shadow_track.db
          git diff --cached --quiet || git commit -m "chore: 주간 섀도우 트랙 스냅샷 업데이트"
          git push
